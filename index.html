<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZAYNEXIS AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 16px;
  text-align: center;
  font-weight: 600;
  font-size: 18px;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 12px 14px;
  margin: 6px 0;
  border-radius: 16px;
  max-width: 80%;
  font-size: 14px;
  animation: fade 0.3s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(8px);}
  to {opacity: 1; transform: translateY(0);}
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

.ai {
  align-self: flex-start;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
}

.inputBox {
  display: flex;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.1);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  margin-left: 8px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">ZAYNEXIS AI 🤖</div>

  <div id="chat" class="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function smartReply(text) {
  text = text.toLowerCase();

  if (text.includes("hello") || text.includes("hi")) {
    return "Hey 👋 I'm ZAYNEXIS AI! Kaise help karu?";
  }

  if (text.includes("name")) {
    return "Mera naam ZAYNEXIS AI hai 🤖";
  }

  if (text.includes("kaise ho")) {
    return "Main ek AI hoon 😄 always ready!";
  }

  if (text.includes("time")) {
    return "⏰ Time: " + new Date().toLocaleTimeString();
  }

  if (text.includes("date")) {
    return "📅 Date: " + new Date().toLocaleDateString();
  }

  if (text.includes("joke")) {
    return "😂 Programmer ka breakup kyun hua? Kyunki usne commit nahi kiya!";
  }

  if (text.includes("motivate")) {
    return "🔥 Tum kuch bhi kar sakte ho — bas consistency rakho!";
  }

  if (text.includes("allah")) {
    return "🤲 Allah sabse bada hai, us par bharosa rakho.";
  }

  const replies = [
    "Hmm interesting 🤔 aur batao...",
    "Yeh acha sawal hai 😎",
    "ZAYNEXIS thinking... 🧠",
    "Future AI ready hai 🚀",
    "Main seekh raha hoon 🔥"
  ];

  return replies[Math.floor(Math.random() * replies.length)];
}

function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Typing...", "ai");

  setTimeout(() => {
    document.querySelectorAll(".ai").forEach(e => {
      if (e.innerText === "Typing...") e.remove();
    });

    const reply = smartReply(text);
    addMsg(reply, "ai");
  }, 700);
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
