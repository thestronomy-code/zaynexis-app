<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZAYNEXIS AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b1220;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
      background: #111;
      padding: 15px;
      border-radius: 15px;
    }

    h2 {
      text-align: center;
      color: cyan;
    }

    .chat {
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
    }

    .user {
      background: #1a2d4a;
      text-align: right;
    }

    .ai {
      background: #2a1a4a;
    }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 20%;
      padding: 10px;
      border: none;
      background: cyan;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="app">
  <h2>ZAYNEXIS AI 🌍</h2>

  <div class="chat" id="chat"></div>

  <input id="input" placeholder="Kuch bhi pucho...">
  <button onclick="send()">Send</button>
</div>

<script>
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

function fakeAI(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("hello") || msg.includes("hi"))
    return "Hello! Main ZAYNEXIS hoon 🤖";

  if (msg.includes("name"))
    return "Mera naam ZAYNEXIS hai — global AI system 🌍";

  if (msg.includes("future"))
    return "Future AI duniya ko connect karega, sab kuch smart hoga 🚀";

  if (msg.includes("who made you"))
    return "Mujhe Jayed ne banaya hai 💡";

  return "Interesting question... main soch raha hoon 🤔";
}

function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMsg(text, "user");

  setTimeout(() => {
    addMsg(fakeAI(text), "ai");
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
